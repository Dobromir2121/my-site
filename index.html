<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://telegram.org"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAK</title>
    <meta name="theme-color" content="#050505">
    <meta name="color-scheme" content="dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #050505;
            --card-bg: rgba(10, 10, 10, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888; /* Сделано ярче (было #555), чтобы текст лучше читался */
            --shadow-glow: 0 0 35px rgba(255, 255, 255, 0.08);
            --transition-fast: 0.25s ease;
            --transition-slow: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            --eye-transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle at center, #101012 0%, #030303 100%);
        }

        /* Начальный экран (Overlay) */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity var(--transition-slow), transform var(--transition-slow);
        }

        #overlay h1 {
            font-size: 2.8rem; /* Чуть увеличили */
            font-weight: 300; /* Более выразительный вес */
            激 letter-spacing: 1rem; /* Сделали более размашистым */
            text-transform: uppercase;
            color: var(--text-main);
            animation: pulse 2.5s infinite ease-in-out;
            user-select: none;
            opacity: 0.8; /* Подняли базовую видимость */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); /* Легкое неоновое свечение */
        }

        #overlay.is-leaving {
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
        }

        /* Главный контент */
        main {
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity var(--transition-slow) 0.2s, transform var(--transition-slow) 0.2s;
        }

        body.is-entered main {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 50px 40px;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        /* Аватар */
        #avatar-wrapper {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #08080a;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        body.entered-done #avatar-wrapper {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-glow);
        }

        /* Лицо (Контейнер для глаз и рта) */
        .face-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 90px;
            opacity: 0.85;
            transition: transform 0.3s ease;
        }

        /* Контейнер глаз */
        .eyes-container {
            width: 100%;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Базовый глаз */
        .eye {
            width: 38px;
            height: 22px;
            background: transparent;
            border: 2px solid #ffffff;
            border-radius: 50% 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: var(--eye-transition);
        }

        /* Зрачки */
        .pupil {
            width: 10px;
            height: 10px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff;
            position: absolute;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), width 0.3s ease, height 0.3s ease;
        }

        /* МИНИМАЛИСТИЧНЫЙ РОТ */
        .mouth {
            width: 24px;
            height: 2px;
            background: #ffffff;
            border-radius: 1px;
            transition: var(--eye-transition);
        }

        /* СИСТЕМА ЭМОЦИЙ И АНИМАЦИЙ */
        .eye.blink {
            height: 1px !important;
            border-top-width: 1px;
            border-bottom-width: 1px;
            background: #ffffff;
        }
        .eye.blink .pupil {
            opacity: 0;
        }

        .face-container.happy .eye {
            border-radius: 100% 100% 0 0;
            height: 16px;
            transform: translateY(-2px);
        }
        .face-container.happy .pupil {
            transform: translateY(2px) !important;
        }
        .face-container.happy .mouth {
            height: 8px;
            width: 26px;
            background: transparent;
            border: 2px solid #ffffff;
            border-top: none;
            border-radius: 0 0 14px 14px;
        }

        .face-container.sad .eye {
            border-radius: 20% 20% 80% 80%;
        }
        .face-container.sad .eye:first-child { transform: rotate(-6deg); }
        .face-container.sad .eye:last-child { transform: rotate(6deg); }
        .face-container.sad .pupil {
            transform: translateY(2px) !important;
        }
        .face-container.sad .mouth {
            height: 6px;
            width: 22px;
            background: transparent;
            border: 2px solid #ffffff;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            transform: translateY(2px);
        }

        .face-container.angry .eye {
            border-radius: 80% 80% 20% 20%;
        }
        .face-container.angry .eye:first-child { transform: rotate(12deg); }
        .face-container.angry .eye:last-child { transform: rotate(-12deg); }
        .face-container.angry .pupil {
            width: 7px;
            height: 7px;
        }
        .face-container.angry .mouth {
            width: 18px;
            height: 3px;
            background: #ffffff;
            transform: translateY(-1px) rotate(-3deg);
        }

        /* Сетка поверх аватара */
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* НИК */
        #who {
            font-size: 2rem; /* Увеличен размер */
            font-weight: 800; /* Жирность на максимум */
            激 letter-spacing: 0.25rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            background: linear-gradient(270deg, #ffffff, #aaaaaa, #ffffff); /* Сделали средний цвет ярче */
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s linear infinite;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        /* ОПИСАНИЕ (Бегущая строка) */
        #footer {
            font-size: 0.9rem; /* Чуть крупнее */
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 500; /* Изменено с 400 на 500 для четкости */
            letter-spacing: 0.04rem;
            min-height: 20px;
            display: inline-block;
            transition: color 0.3s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5); /* Тень для читаемости */
        }

        /* Кнопки */
        .flexbox {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .flexbox a {
            text-decoration: none;
            width: 100%;
        }

        .flexbox button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.02);
            color: #aeaeae; /* Изменено с тусклого #666 на благородный светлый */
            font-size: 1rem; /* Слегка увеличили */
            font-weight: 600; /* Сделали текст кнопок жирнее */
            letter-spacing: 0.05rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Отступ между иконкой и текстом */
            transition: all var(--transition-fast);
        }

        /* Иконки внутри кнопок */
        .flexbox button i {
            font-size: 1.2rem;
            transition: transform var(--transition-fast);
        }

        .flexbox button:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.12);
        }

        /* Легкий интерактив для иконок при наведении */
        .flexbox button:hover i {
            transform: scale(1.1);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 400px) {
            .card { width: 90vw; padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Tap</h1>
    </div>

    <div id="bg-canvas"></div>

    <main>
        <section class="card" aria-label="Profile">
            <div id="avatar-wrapper">
                <div class="face-container">
                    <div class="eyes-container">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="mouth"></div>
                </div>
                <div class="avatar-overlay"></div>
            </div>
            
            <span id="who">Добрыня</span>
            <span id="footer">Loading...</span>
            
            <div class="flexbox">
                <a href="https://t.me/samyykrutoyvmire" target="_blank" rel="noopener noreferrer">
                    <button><i class="fa-brands fa-telegram"></i> Telegram</button>
                </a>
                <a href="https://www.tiktok.com/@colobok98?_r=1&_t=ZS-97DNOqvWjif" target="_blank" rel="noopener noreferrer">
                    <button><i class="fa-brands fa-tiktok"></i> TikTok</button>
                </a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const overlay = document.getElementById("overlay");
            const footerText = document.getElementById("footer");
            const faceContainer = document.querySelector(".face-container");
            const eyes = document.querySelectorAll(".eye");
            const pupils = document.querySelectorAll(".pupil");

            const phrases = [
                "Добро пожаловать на страницу!",
                "Спасибо, что заглянул!",
                "Переходи по ссылкам ниже",
                "Здесь могла быть ваша реклама :)"
            ];

            const emotions = ['normal', 'happy', 'sad', 'angry', 'surprised'];
            let currentEmotion = 'normal';
            let isPageActive = false;
            let currentPhraseIndex = 0;

            function typePhrase(text, callback) {
                let i = 0;
                footerText.textContent = "";
                
                function type() {
                    if (!isPageActive) return;
                    if (i < text.length) {
                        footerText.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, 60);
                    } else if (callback) {
                        setTimeout(callback, 3500);
                    }
                }
                type();
            }

            function erasePhrase(callback) {
                function erase() {
                    if (!isPageActive) return;
                    let text = footerText.textContent;
                    if (text.length > 0) {
                        footerText.textContent = text.substring(0, text.length - 1);
                        setTimeout(erase, 30);
                    } else if (callback) {
                        setTimeout(callback, 300);
                    }
                }
                erase();
            }

            function startDescriptionTicker() {
                if (!isPageActive) return;
                const targetText = phrases[currentPhraseIndex];

                typePhrase(targetText, () => {
                    erasePhrase(() => {
                        currentPhraseIndex = (currentPhraseIndex + 1) % phrases.length;
                        startDescriptionTicker();
                    });
                });
            }

            function lookAround() {
                if (!isPageActive) return;

                if (currentEmotion === 'happy' || currentEmotion === 'sad') {
                    setTimeout(lookAround, Math.random() * 2000 + 1000);
                    return;
                }

                const moveX = (Math.random() - 0.5) * 12;
                const moveY = (Math.random() - 0.5) * 8;

                pupils.forEach(pupil => {
                    pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
                });

                faceContainer.style.transform = `translate(${moveX * 0.2}px, ${moveY * 0.2}px)`;

                setTimeout(lookAround, Math.random() * 3000 + 1000);
            }

            function blink() {
                if (!isPageActive) return;

                eyes.forEach(eye => eye.classList.add('blink'));

                setTimeout(() => {
                    eyes.forEach(eye => eye.classList.remove('blink'));
                }, 120);

                setTimeout(blink, Math.random() * 4000 + 3000);
            }

            function changeEmotion() {
                if (!isPageActive) return;

                emotions.forEach(emo => faceContainer.classList.remove(emo));

                const nextEmotion = emotions[Math.floor(Math.random() * emotions.length)];
                currentEmotion = nextEmotion;
                
                faceContainer.classList.add(nextEmotion);

                pupils.forEach(pupil => {
                    pupil.style.transform = 'translate(0, 0)';
                });

                setTimeout(changeEmotion, Math.random() * 4000 + 4000);
            }

            overlay.addEventListener("click", function () {
                overlay.classList.add('is-leaving');
                setTimeout(() => {
                    overlay.style.display = "none";
                }, 800);

                document.body.classList.add('is-entered');

                window.__enterDoneTimer = window.setTimeout(() => {
                    document.body.classList.add('entered-done');
                    isPageActive = true;
                    
                    startDescriptionTicker();
                    lookAround();
                    blink();
                    changeEmotion();
                }, 1400);
            });
        });
    </script>
</body>
</html>
